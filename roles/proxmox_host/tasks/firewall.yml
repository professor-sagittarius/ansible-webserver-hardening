# roles/proxmox_host/tasks/firewall.yml
- name: Assert proxmox_cluster_cidr is set for cluster nodes
  ansible.builtin.assert:
    that: proxmox_cluster_cidr | length > 0
    fail_msg: "proxmox_cluster_cidr must be set when proxmox_cluster_node is true"
  when: proxmox_cluster_node | bool

- name: Write PVE host firewall config
  ansible.builtin.template:
    src: host.fw.j2
    dest: /etc/pve/local/host.fw
    owner: root
    group: www-data
    mode: '0640'
