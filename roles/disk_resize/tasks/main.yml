- name: Install growpart (cloud-guest-utils)
  ansible.builtin.apt:
    name: cloud-guest-utils
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Detect partition device path
  ansible.builtin.set_fact:
    _partition_device: "{{ disk_device ~ 'p' ~ partition_number if disk_device is match('.*(nvme|mmcblk).*') else disk_device ~ partition_number | string }}"

- name: Grow partition to use all available space
  ansible.builtin.command:
    cmd: "growpart {{ disk_device }} {{ partition_number }}"
  register: growpart_result
  changed_when: "'CHANGED' in growpart_result.stdout"
  failed_when: growpart_result.rc != 0 and 'NOCHANGE' not in growpart_result.stdout

- name: Detect filesystem type on partition
  ansible.builtin.command:
    cmd: "blkid -s TYPE -o value {{ _partition_device }}"
  register: _fs_type_result
  changed_when: false

- name: Resize ext2/ext3/ext4 filesystem
  ansible.builtin.command:
    cmd: "resize2fs {{ _partition_device }}"
  register: resize_result
  changed_when: "'nothing to do' not in resize_result.stderr"
  failed_when: resize_result.rc != 0 and 'Nothing to do' not in resize_result.stderr
  when:
    - growpart_result.changed
    - _fs_type_result.stdout | default('') in ['ext2', 'ext3', 'ext4']
  notify: reboot system

- name: Resize XFS filesystem
  ansible.builtin.command:
    cmd: "xfs_growfs {{ _partition_device }}"
  register: xfs_resize_result
  changed_when: true
  when:
    - growpart_result.changed
    - _fs_type_result.stdout | default('') == 'xfs'
  notify: reboot system

- name: DEBUG - show partition device and filesystem type
  ansible.builtin.debug:
    msg:
      - "partition_device: {{ _partition_device }}"
      - "fs_type stdout: '{{ _fs_type_result.stdout | default('') }}'"
      - "fs_type rc: {{ _fs_type_result.rc | default('N/A') }}"
      - "fs_type stderr: '{{ _fs_type_result.stderr | default('') }}'"

- name: Detect ZFS pool name from partition
  ansible.builtin.command:
    cmd: "blkid -s LABEL -o value {{ _partition_device }}"
  register: _zfs_pool_result
  changed_when: false
  failed_when: false
  when: _fs_type_result.stdout | default('') == 'zfs_member'

- name: DEBUG - ZFS diagnostics
  ansible.builtin.shell:
    cmd: |
      echo "=== partition device ==="
      echo "{{ _partition_device }}"
      echo "=== blkid full output ==="
      blkid {{ _partition_device }}
      echo "=== pool name from blkid LABEL ==="
      echo "{{ _zfs_pool_result.stdout | default('EMPTY') | trim }}"
      echo "=== zpool list ==="
      zpool list
      echo "=== zpool status -P ==="
      zpool status -P
  register: _zfs_debug
  changed_when: false
  failed_when: false
  when: _fs_type_result.stdout | default('') == 'zfs_member'

- name: DEBUG - show ZFS diagnostic output
  ansible.builtin.debug:
    msg: "{{ _zfs_debug.stdout_lines | default([]) }}"
  when: _fs_type_result.stdout | default('') == 'zfs_member'

- name: Expand ZFS pool to use grown partition
  ansible.builtin.shell:
    cmd: |
      pool="{{ _zfs_pool_result.stdout | trim }}"
      vdev=$(zpool status -P "$pool" | awk '/\/dev\//{gsub(/^[[:space:]]+/, ""); print $1}' | grep -F "{{ _partition_device }}" | head -1)
      vdev=${vdev:-{{ _partition_device }}}
      zpool set autoexpand=on "$pool"
      zpool online -e "$pool" "$vdev"
  changed_when: true
  when:
    - _fs_type_result.stdout | default('') == 'zfs_member'
    - (_zfs_pool_result.stdout | default('')) | trim != ''
  notify: reboot system

- name: Fail if filesystem type is unsupported
  ansible.builtin.fail:
    msg: >
      Unsupported filesystem type '{{ _fs_type_result.stdout | default('unknown') }}'
      on {{ _partition_device }}. Supported types: ext2, ext3, ext4, xfs, zfs_member.
      Resize manually or extend this role.
  when:
    - growpart_result.changed
    - _fs_type_result.stdout | default('') not in ['ext2', 'ext3', 'ext4', 'xfs', 'zfs_member', '']
