# HPB (High-Performance Backend) provisioning
# Targets Debian VPS on Hetzner or similar providers (not Proxmox).
# Provisions the server for the half-price-books Nextcloud Talk HPB + Collabora stack.
# See: https://github.com/professor-sagittarius/half-price-books

- name: HPB Server Setup
  hosts: all
  become: true

  vars:
    # Users (robertdebock.users)
    # Define users_user_list and users_group_list in inventory. Example:
    # users_group_list:
    #   - name: docker
    # users_user_list:
    #   - name: admin
    #     groups:
    #       - sudo
    #       - docker
    #     password: "{{ admin_password | password_hash('sha512') }}"
    #     authorized_keys:
    #       - "ssh-ed25519 AAAAC3..."
    #     expires: -1

    # Firewall (geerlingguy.firewall)
    # Port 80 must remain open: certbot uses HTTP-01 challenges for certificate issuance and renewal.
    firewall_allowed_tcp_ports:
      - "22"
      - "80"
      - "443"
      - "3478"
    firewall_allowed_udp_ports:
      - "3478"
    # Janus RTP media range (20000-40000) cannot be expressed as individual ports in
    # firewall_allowed_udp_ports; use firewall_additional_rules instead.
    firewall_additional_rules:
      - "iptables -A INPUT -p udp --dport 20000:40000 -j ACCEPT"
    firewall_flush_rules_and_chains: false
    firewall_log_dropped_packets: true

    # OS hardening (devsec.hardening.os_hardening)
    # network_ipv6_enable must be true: Collabora is reached by Nextcloud instances via IPv6.
    network_ipv6_enable: true
    sysctl_overwrite:
      net.ipv4.ip_forward: 1
      net.ipv6.conf.all.forwarding: 1
    os_auth_pw_max_age: -1
    os_auth_pw_min_age: 0
    os_auth_lockout_time: 120
    os_ctrlaltdel_disabled: true
    os_remove_additional_root_users: true
    os_security_auto_logout: 1800

    # SSH hardening (devsec.hardening.ssh_hardening)
    sftp_enabled: true
    ssh_server_ports: ['22']
    ssh_max_auth_retries: 3
    ssh_client_alive_interval: 300
    ssh_client_alive_count: 6
    # Explicitly map ssh_password_authentication (used by ssh_preflight) to the
    # devsec variable name so both roles always agree on the setting.
    ssh_server_password_login: "{{ ssh_password_authentication | default(false) }}"
    # Restrict SSH to members of the sudo group only.
    ssh_allow_groups: "sudo"

    # Fail2ban (robertdebock.fail2ban)
    fail2ban_bantime: 3600
    fail2ban_findtime: 600
    fail2ban_maxretry: 5
    fail2ban_ignoreips: "127.0.0.1/8 ::1 {{ ansible_default_ipv4.network | default('') }}/24"
    fail2ban_jail_configuration:
      - option: enabled
        value: "true"
        section: sshd

    # Docker (local role wrapping geerlingguy.docker)
    docker_edition: 'ce'
    docker_packages_state: present
    docker_service_manage: true
    docker_service_state: started
    docker_service_enabled: true
    docker_install_compose_plugin: true
    docker_compose_package_state: present
    docker_users: []                        # Managed by robertdebock.users instead
    install_docker_python: true
    install_portainer: false
    portainer_version: "2.21.5"
    portainer_http_port: 8000
    portainer_https_port: 9443
    portainer_data_dir: "/opt/portainer"
    portainer_bind_address: "127.0.0.1"
    install_dockge: false
    dockge_version: "1.4.2"
    dockge_port: 5001
    dockge_install_dir: "/opt/dockge"
    dockge_stacks_dir: "/opt/stacks"
    dockge_bind_address: "127.0.0.1"

    # Docker log rotation
    docker_log_driver: "json-file"
    docker_log_max_size: "10m"
    docker_log_max_file: "3"

  roles:
    # Phase 1: User setup (must happen before SSH hardening checks)
    - role: robertdebock.users
      vars:
        users: "{{ users_user_list }}"
        users_groups: "{{ users_group_list | default([]) }}"
      when: users_user_list | default([]) | length > 0

    # Phase 2: SSH lockout prevention check
    - role: ssh_preflight

    # Phase 3: Base system configuration
    # guest_agent and disk_resize are omitted: not applicable on Hetzner VPS
    - role: base

    # Phase 4: HPB package installation (nginx, certbot, python3-certbot-nginx, etc.)
    - role: hpb

    # Phase 5: Docker installation (before firewall)
    - role: docker

    # Phase 6: Security hardening
    - role: geerlingguy.firewall

    - role: robertdebock.fail2ban

    - role: robertdebock.cron

    - role: devsec.hardening.os_hardening

    - role: devsec.hardening.ssh_hardening
