[defaults]
inventory = inventories/localhost.yml
roles_path = roles
# Disabled for initial provisioning of fresh VMs (no known_hosts entry yet).
# For ongoing operations in untrusted networks, set to True or remove this line
# and pre-accept host keys with: ssh-keyscan <host> >> ~/.ssh/known_hosts
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
